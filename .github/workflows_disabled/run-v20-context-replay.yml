name: Run V20 Context Replay

on:
  workflow_dispatch:

jobs:
  run-v20:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy

      - name: Run V20 Context Replay
        env:
          V20_CACHE_DIR: cache_stock
          V20_OUTPUT_DIR: tracker_output
          V20_MIN_ROWS_PER_PATTERN: "20"
        run: |
          python v20_context_replay_trade_review_engine_vi.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add tracker_output/v20_*.csv tracker_output/v20_context_report.txt || true
          git commit -m "Update V20 context replay outputs" || echo "No changes to commit"
          git push
