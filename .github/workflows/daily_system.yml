name: Daily Trading System

on:
  schedule:
    # CHẠY THẬT: 17:00 → 20:30 giờ Việt Nam
    # UTC = 10:00 → 13:30, thứ 2-6
    - cron: "0,30 10-13 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trading-bot
  cancel-in-progress: true

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug time
        run: |
          echo "UTC time:"
          date
          echo "Vietnam time:"
          TZ='Asia/Ho_Chi_Minh' date

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run batch trading system
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_daily_system.py

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git pull --rebase origin main || true

          git add all_signal_results.csv raw_signal_candidates.csv ai_risk_filtered.csv bottom_common_priority.csv momentum_common_priority.csv entry_plan_next_session.csv action_plan.csv portfolio_tracker.csv ai_risk_dashboard.html progress_state.csv signal_history.csv pattern_stats.csv walk_forward_stats.csv backfill_signal_history.csv backfill_walk_forward_stats.csv backfill_state.csv regime_stats.csv

          git commit -m "auto update $(TZ='Asia/Ho_Chi_Minh' date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"

          git pull --rebase origin main || true
          git push
