name: Daily Trading System

on:
  schedule:
    # TEST: chạy mỗi 1 phút
    - cron: "* * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug time
        run: |
          echo "UTC time:"
          date
          echo "Vietnam time:"
          TZ='Asia/Ho_Chi_Minh' date

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run batch trading system
        run: python run_daily_system.py

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "auto update $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
