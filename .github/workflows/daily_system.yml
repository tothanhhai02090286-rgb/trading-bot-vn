name: Daily Trading System

on:
  schedule:
    # TEST: chạy mỗi 5 phút (bật tạm để kiểm tra auto)
    - cron: "*/5 * * * *"

    # CHẠY THẬT: 17:00 Việt Nam (UTC+7 = 10:00 UTC)
    - cron: "0 10 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      # ===== Clone repo =====
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # ===== Setup Python =====
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ===== Install lib =====
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ===== Run hệ thống =====
      - name: Run batch trading system
        run: python run_daily_system.py

      # ===== Commit kết quả =====
      - name: Commit and push outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "auto update $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"

          git push
