name: Daily Trading System

on:
  schedule:
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily system
        run: python run_daily_system.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add *.csv || true
          git add *.html || true
          git add progress_state.csv || true
          git add all_signal_results.csv || true

          git commit -m "update trading outputs" || echo "No changes"
          git push
