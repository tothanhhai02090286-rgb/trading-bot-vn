name: Daily Trading System

on:
  schedule:
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

jobs:
  run-daily:
    runs-on: ubuntu-latest

    env:
      BOT_DIR: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily system
        run: python run_daily_system.py

      - name: Commit results
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "update data" || echo "no change"
          git push
