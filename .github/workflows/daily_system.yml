name: Daily Trading System

on:
  schedule:
    # 17:00 → 20:30 giờ Việt Nam, cách nhau 30 phút
    # UTC tương ứng: 10:00 → 13:30
    - cron: "0,30 10-13 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run batch engine
        run: python run_daily_system.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "auto update $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
