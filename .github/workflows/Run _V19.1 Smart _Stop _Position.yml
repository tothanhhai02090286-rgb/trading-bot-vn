name: Run V19.1 Smart Stop Position Desk

on:
  workflow_dispatch:

jobs:
  run-v191:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install pandas numpy

      - name: Run V19.1
        run: |
          python v19.danh_muc_mua/v191_smart_stop_position_desk_vi.py

      - name: Commit outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add \
          positions_v19.csv \
          positions_v19_template.csv \
          v191_position_management.csv \
          v191_trade_actions.csv \
          v191_position_state.csv \
          v191_position_report.txt \
          v191_position_dashboard.html || true

          git commit -m "Update V19.1 outputs" || echo "No changes"

          git push
