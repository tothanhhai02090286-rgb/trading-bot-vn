name: Update Cache Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "10 9 * * 1-5"  # 16:10 VN

permissions:
  contents: write

concurrency:
  group: update-cache
  cancel-in-progress: false

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests vnstock python-dotenv

      - name: Run update cache
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
          CACHE_UPDATE_BATCH_SIZE: "50"
        run: |
          python update_cache_daily.py

      - name: Commit cache and state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add cache_stock/*.csv || true
          git add cache_update_state.csv || true

          git commit -m "Update cache batch" || echo "No changes to commit"
          git push
