name: Update Cache Daily

on:
  schedule:
    - cron: '10 9 * * 1-5'  # 16:10 VN (UTC+7)
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install vnstock pandas numpy python-dotenv

      - name: Run update cache
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: |
          python update_cache_daily.py

      - name: Commit cache
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add cache_stock/*.csv || true
          git commit -m "Update cache daily" || echo "No changes"
          git push
