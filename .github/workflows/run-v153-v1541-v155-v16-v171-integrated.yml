name: Run V15.3 V15.4.1 V15.5 V16 V17.1 Integrated

on:
  workflow_dispatch:

  schedule:
    # 15:30 giờ Việt Nam = 08:30 UTC
    - cron: "30 8 * * 1-5"

permissions:
  contents: write
  actions: read

jobs:
  run-integrated-pipeline:
    name: Run integrated research risk survival meta final pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements_intraday.txt ]; then
            pip install -r requirements_intraday.txt
          fi

          pip install pandas numpy

      - name: Check required python files
        run: |
          test -f v153_pro_research_upgrade_vi.py || exit 1
          test -f v1541_portfolio_risk_exit_engine_vi.py || exit 1
          test -f v155_equity_survival_engine_vi.py || exit 1
          test -f v16_meta_allocation_intelligence_vi.py || exit 1
          test -f v171_final_decision_orchestrator_vi.py || exit 1

      - name: Syntax check
        run: |
          python -m py_compile v153_pro_research_upgrade_vi.py
          python -m py_compile v1541_portfolio_risk_exit_engine_vi.py
          python -m py_compile v155_equity_survival_engine_vi.py
          python -m py_compile v16_meta_allocation_intelligence_vi.py
          python -m py_compile v171_final_decision_orchestrator_vi.py

      - name: Run V15.3 PRO research layer
        run: |
          echo "===== RUN V15.3 PRO ====="
          python3 v153_pro_research_upgrade_vi.py

      - name: Run V15.4.1 portfolio risk exit layer
        run: |
          echo "===== RUN V15.4.1 ====="
          python3 v1541_portfolio_risk_exit_engine_vi.py

      - name: Run V15.5 equity survival layer
        run: |
          echo "===== RUN V15.5 ====="
          python3 v155_equity_survival_engine_vi.py

      - name: Run V16 meta allocation intelligence layer
        run: |
          echo "===== RUN V16 ====="
          python3 v16_meta_allocation_intelligence_vi.py

      - name: Run V17.1 final decision orchestrator layer
        run: |
          echo "===== RUN V17.1 ====="
          python3 v171_final_decision_orchestrator_vi.py

      - name: Check final outputs
        run: |
          test -f v17_final_decision.csv || exit 1
          test -f intraday_watchlist_v17.csv || exit 1
          test -f v171_orchestrator_report.txt || exit 1
          test -f v171_orchestrator.html || exit 1

      - name: Commit updated V17 watchlist to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add v17_final_decision.csv
          git add intraday_watchlist_v17.csv
          git add v171_orchestrator_report.txt

          git commit -m "Update V17 final decision and intraday watchlist" || echo "No changes to commit"
          git push

      - name: Print final V17.1 report
        if: always()
        run: |
          echo "===== FINAL REPORT V17.1 ====="

          if [ -f v171_orchestrator_report.txt ]; then
            cat v171_orchestrator_report.txt
          else
            echo "Không có report V17.1."
          fi

      - name: Upload integrated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v153-v1541-v155-v16-v171-integrated-output
          if-no-files-found: warn
          retention-days: 14
          path: |
            v153_pro_research.csv
            v153_pro_research_detail.csv
            v153_pro_research_portfolio.csv
            v153_pro_research.html
            v153_pro_research_report.txt

            v1541_portfolio_risk_exit.csv
            v1541_portfolio_risk_exit_detail.csv
            v1541_portfolio_equity.csv
            v1541_portfolio_risk_exit.html
            v1541_portfolio_risk_exit_report.txt

            v155_equity_survival_allocation.csv
            v155_equity_survival_equity.csv
            v155_equity_survival_report.txt
            v155_equity_survival.html

            v16_meta_allocation.csv
            v16_meta_risk_state.csv
            v16_capital_map.csv
            v16_rotation_plan.csv
            v16_meta_allocation_report.txt
            v16_meta_allocation.html

            v17_final_decision.csv
            intraday_watchlist_v17.csv
            v171_orchestrator_report.txt
            v171_orchestrator.html
