name: Run V19 Position Management

on:
  workflow_dispatch:

jobs:
  run-v19:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install pandas numpy

      - name: Run V19 Position Management
        run: |
          python v19.danh_muc_mua/v19_position_trade_management_engine_vi.py

      - name: Commit V19 outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add positions_v19_template.csv positions_v19.csv v19_position_management.csv v19_trade_actions.csv v19_position_state.csv v19_position_report.txt v19_position_dashboard.html || true
          git commit -m "Update V19 position management outputs" || echo "No changes"
          git push
